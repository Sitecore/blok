name: Feature request
description: Suggest a new feature or enhancement for Sitecore Blok CN.
labels: [enhancement, feature request]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please fill out the sections below—the more specific you are, the easier it is to evaluate.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: Optional—what problem would this solve? Why does it matter?
      placeholder: I'm always frustrated when…
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see built or changed?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional—other approaches you have considered.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Optional—bullet list of “done when…” to reduce ambiguity.
    validations:
      required: false
  - type: textarea
    id: breaking
    attributes:
      label: Breaking changes / migration
      description: Optional—could this break existing consumers? Any migration ideas?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, screenshots, links, or examples.
    validations:
      required: false
