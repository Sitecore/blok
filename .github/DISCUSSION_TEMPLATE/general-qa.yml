name: "General Q&A"
description: Questions and help using Blok—integration, APIs, how-to, docs, or general topics (single Q&A category).
labels: [question, discussion]
body:
  - type: markdown
    attributes:
      value: |
        Use this category for **how-to**, **usage**, **integration**, and **general questions**. For something broken or reproducible, use **Bug reports** instead.
  - type: textarea
    id: topic
    attributes:
      label: What's your question or topic?
      description: Describe what you'd like to ask or discuss.
    validations:
      required: true
  - type: textarea
    id: attempts
    attributes:
      label: What have you tried so far?
      description: For troubleshooting, list what you already tried. Use "N/A" if this is a general or informational question.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Optional—OS, framework (e.g. Next.js), Node version, Blok or package versions if relevant.
    validations:
      required: false
  - type: textarea
    id: code-sample
    attributes:
      label: Code sample
      description: Optional—minimal snippet if your question is about using a component or API.
      render: typescript
    validations:
      required: false
  - type: textarea
    id: details
    attributes:
      label: Additional details
      description: Background, links, screenshots, error messages, or other context.
    validations:
      required: false
