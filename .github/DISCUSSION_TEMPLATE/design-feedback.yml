name: Design feedback
description: Feedback on UI components, layout, or design patterns in Blok CN.
labels: [design, feedback]
body:
  - type: markdown
    attributes:
      value: |
        We appreciate your design insights. Specific examples or references help us act on feedback faster.
  - type: input
    id: component
    attributes:
      label: Component or pattern
      description: What are you giving feedback on?
      placeholder: e.g. Alert, Dialog, Button, spacing tokens
    validations:
      required: true
  - type: textarea
    id: likes
    attributes:
      label: What works well
      description: Optional—what should we preserve or build on?
    validations:
      required: false
  - type: textarea
    id: improvements
    attributes:
      label: What could be improved
      description: Optional—concrete improvement suggestions.
    validations:
      required: false
  - type: textarea
    id: references
    attributes:
      label: References or examples
      description: Optional—links, screenshots, or inspiration from other design systems.
    validations:
      required: false
