labels: [idea, brainstorming]
body:
  - type: markdown
    attributes:
      value: |
        **Ideas** — Share early-stage suggestions or improvements for the Blok UI library. We can refine together. For a fully specified change, use **Feature requests** instead.
  - type: textarea
    id: idea
    attributes:
      label: Describe your idea
      description: What is your idea and how could it improve Blok?
    validations:
      required: true
  - type: textarea
    id: benefits
    attributes:
      label: Benefits
      description: Optional—who benefits (developers, designers, end users) and how?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Examples, links, sketches, or references.
    validations:
      required: false
